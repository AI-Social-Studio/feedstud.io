name: feedstudio

x-app-shared-env: &app-shared-env
  OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
  OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openai/gpt-oss-120b:free}"
  OPENROUTER_MAX_TOKENS: "${OPENROUTER_MAX_TOKENS:-8192}"
  OPENROUTER_TEMPERATURE: "${OPENROUTER_TEMPERATURE:-0.9}"
  OPENROUTER_SITE_URL: "${OPENROUTER_SITE_URL:-http://localhost:3000}"
  OPENROUTER_APP_NAME: "${OPENROUTER_APP_NAME:-Feedstudio}"
  RABBITMQ_URL: "${RABBITMQ_URL:-amqp://feedstudio:feedstudio@rabbitmq:5672/}"
  RABBITMQ_GENERATE_QUEUE: "${RABBITMQ_GENERATE_QUEUE:-generate_posts}"
  RABBITMQ_PREFETCH_COUNT: "${RABBITMQ_PREFETCH_COUNT:-10}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedstudio
      POSTGRES_PASSWORD: feedstudio
      POSTGRES_DB: feedstudio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedstudio -d feedstudio"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: feedstudio
      MINIO_ROOT_PASSWORD: feedstudio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: feedstudio
      RABBITMQ_DEFAULT_PASS: feedstudio
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      <<: *app-shared-env
      APP_ENV: development
      APP_PORT: 4000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql+asyncpg://feedstudio:feedstudio@postgres:5432/feedstudio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: feedstudio
      MINIO_SECRET_KEY: feedstudio-secret
      MINIO_BUCKET: feedstudio-uploads
      MINIO_SECURE: "false"
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
      UPLOAD_MAX_FILES: "10"
      UPLOAD_MAX_FILE_BYTES: "10485760"
      DB_RESET_ON_START: "${DB_RESET_ON_START:-false}"
      BACKEND_INTERNAL_API_KEY: "${BACKEND_INTERNAL_API_KEY:-}"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      <<: *app-shared-env
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://feedstudio:feedstudio@postgres:5432/feedstudio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: feedstudio
      MINIO_SECRET_KEY: feedstudio-secret
      MINIO_BUCKET: feedstudio-uploads
      MINIO_SECURE: "false"
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
